# .github/workflows/deploy.yml

name: Connect and Test EC2

on:
  push:
    branches: [ "access-test" ]
  pull_request:
    branches: [ "access-test" ]

jobs:
  test-connectivity:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.AWS_EC2_KEY }} # <--- 수정

      - name: Add Public EC2 to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.AWS_EC2_HOST }} >> ~/.ssh/known_hosts # <--- 수정

      - name: Execute remote commands
        run: |
          echo "### 1. Successfully connected to Public EC2 from GitHub Actions ###"
          ssh ${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }} 'bash -s' <<'ENDSSH'
            # 이 스크립트는 Public EC2 내부에서 실행됩니다.
            set -e

            echo "### DEBUG: Checking for keys in the SSH Agent on Public EC2... ###"
            ssh-add -l
            # 위 명령어 실행 결과가 "The agent has no identities." 라고 나오면 키 전달에 실패한 것입니다.
            # 정상이라면 키의 지문(fingerprint)이 출력되어야 합니다.

            PRIVATE_EC2_IP="10.0.70.192"
            
            echo "### 2. Trying to connect to Private EC2 from Public EC2... ###"
            ssh -A -v -o StrictHostKeyChecking=no ${{ secrets.AWS_EC2_USER }}@$PRIVATE_EC2_IP 'bash -s' <<'INNER_ENDSSH'
              # Private EC2 내부에서 실행되는 스크립트는 그대로 둡니다.
              set -e
              echo "### 3. Successfully connected to Private EC2 ###"
              echo "### SUCCESS! ###"
          INNER_ENDSSH
          ENDSSH
