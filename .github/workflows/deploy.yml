# .github/workflows/deploy.yml

name: Connect and Test EC2

on:
  push:
    branches: [ "access-test" ]
  pull_request:
    branches: [ "access-test" ]

jobs:
  test-connectivity:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}

      - name: Add Public EC2 to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.AWS_PUBLIC_HOST }} >> ~/.ssh/known_hosts

      - name: Execute remote commands
        run: |
          echo "### 1. Successfully connected to Public EC2 from GitHub Actions ###"
          ssh ${{ secrets.AWS_USERNAME }}@${{ secrets.AWS_PUBLIC_HOST }} 'bash -s' <<'ENDSSH'
            # 이 스크립트는 Public EC2 내부에서 실행됩니다.
            set -e # 오류 발생 시 즉시 중단

            PRIVATE_EC2_IP="10.0.70.192" # Private EC2의 내부 IP
            PUBLIC_EC2_PRIVATE_IP="10.0.1.247" # Public EC2의 내부 IP
            PROXY_PORT="3128"

            echo "### 2. Trying to connect to Private EC2 from Public EC2... ###"

            # Public EC2에서 Private EC2로 SSH 접속하여 내부 스크립트 실행
            ssh -o StrictHostKeyChecking=no ec2-user@$PRIVATE_EC2_IP 'bash -s' <<'INNER_ENDSSH'
              # 이 스크립트는 Private EC2 내부에서 실행됩니다.
              set -e

              echo "### 3. Successfully connected to Private EC2 ###"
              echo "### 4. Testing connectivity to Proxy Server... ###"

              # 4-1. nc 명령어로 프록시 포트 연결 확인 (이미 성공하셨던 부분)
              nc -vz 10.0.1.247 3128

              echo "### 5. Setting up proxy environment variables... ###"
              # no_proxy에서 .amazonaws.com 제거
              export http_proxy="http://10.0.1.247:3128"
              export https_proxy="http://10.0.1.247:3128"
              export no_proxy="localhost,127.0.0.1,169.254.169.254"

              echo "### 6. Testing external internet access via proxy... ###"
              # 6-1. curl을 사용한 외부 사이트 접속 테스트
              curl -sv -o /dev/null --connect-timeout 10 https://www.google.com

              echo "### 7. Testing AWS service access via proxy... ###"
              # 6-2. AWS CLI를 사용한 AWS 서비스 접속 테스트
              aws sts get-caller-identity

              echo "### SUCCESS: All connectivity tests passed on Private EC2! ###"
          INNER_ENDSSH
          ENDSSH
